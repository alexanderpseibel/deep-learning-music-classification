# ------------------------------
#      MODEL + TRAINING
# ------------------------------

model: "ImprovedK2C2CNN"
seed: 42

# Use full dataset
#subset_size: 20000     

epochs: 20

# Base LR (AdamW uses this before OneCycle takes over)
lr: 0.0001
weight_decay: 0.0005

batch_size: 32
num_workers: 16

# ------------------------------
#      Optimizer
# ------------------------------

optimizer: "adamw"

# ------------------------------
#      LR Scheduler (OneCycleLR)
# ------------------------------

scheduler: "onecycle"

# Peak LR during OneCycle
max_lr: 0.0005

# Final LR after annealing
final_lr: 0.00001

# Warmup ratio (start slow → ramp up)
pct_start: 0.3

# ------------------------------
#      Data Augmentation
# ------------------------------

use_specaugment: true

specaugment:
  freq_masks: 4
  time_masks: 4
  freq_max_width: 24
  time_max_width: 80

