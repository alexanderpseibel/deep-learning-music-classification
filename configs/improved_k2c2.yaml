experiment_name: "improved k2c2"

model:
  type: "GenericCNN"
  channels: [32, 64, 128, 256, 512]
  kernels:  [[3,3],[3,3],[3,3],[3,3],[3,3]]
  pooling:  [[2,4],[2,4],[2,4],[3,5],[4,4]]
  dropout: 0.2
  activation: "elu"

epochs: 20

# ------------------------------
# Optimization
# ------------------------------
lr: 0.0001
max_lr: 0.0005
final_lr: 0.00001
pct_start: 0.3
weight_decay: 0.0001

batch_size: 32
num_workers: 16

optimizer: "adamw"
scheduler: "onecycle"

use_normalization: false

# ------------------------------
# Interpretability (Grad-CAM + SmoothGrad)
# ------------------------------
interpretability:
  enabled: true
  log_every: 5
  samples:
    - track_id: 9793
      label: 11   # SoulRnB
      path: "/work/NLP-mini-project/datasets/fma/fma_clean/mels/009/009793.npy"

    - track_id: 110757
      label: 5    # HipHop
      path: "/work/NLP-mini-project/datasets/fma/fma_clean/mels/110/110757.npy"

    - track_id: 123844
      label: 0    # Rock
      path: "/work/NLP-mini-project/datasets/fma/fma_clean/mels/123/123844.npy"


